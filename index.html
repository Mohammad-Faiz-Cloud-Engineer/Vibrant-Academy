<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vibrant Academy - Study Materials for Class 11th and 12th Physics, Chemistry, and Mathematics">
    <meta name="author" content="Vibrant Academy">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <!-- No-cache directives for HTML -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <meta name="theme-color" content="#ff4757">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vibrant Academy">
    <title>Vibrant Academy | Study Materials</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" href="./icon/logo.png">
    <link rel="apple-touch-icon" href="./icon/logo.png">
    
    <!-- Preload critical resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Load stylesheet first -->
    <link rel="stylesheet" href="./styles.css">
    
    <!-- Load fonts asynchronously -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
</head>
<body>
    <nav class="nav">
        <div class="nav-wrap">
            <div class="brand">
                <img src="./icon/logo.png" alt="Vibrant Academy Logo" class="brand-logo">
                <span class="brand-name">Vibrant Academy</span>
            </div>
            <div class="class-tabs">
                <button class="tab active" data-class="11">11</button>
                <button class="tab" data-class="12">12</button>
                <button class="tab" data-class="others">Others</button>
                <button class="tab" data-class="music">Music</button>
                <button class="tab" data-class="prompts">Prompts</button>
            </div>
        </div>
    </nav>

    <div class="hero">
        <div class="hero-wrap">
            <div class="class-tabs-mobile">
                <button class="tab active" data-class="11">11</button>
                <button class="tab" data-class="12">12</button>
                <button class="tab" data-class="others">Others</button>
                <button class="tab" data-class="music">Music</button>
                <button class="tab" data-class="prompts">Prompts</button>
            </div>
            <input type="text" id="searchInput" placeholder="Search materials..." class="search">
            <button id="downloadBtn" class="download-btn" aria-label="Download complete class modules">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                </svg>
                <span id="downloadText">Download All Materials</span>
            </button>
        </div>
    </div>

    <main class="main">
        <div id="content"></div>
    </main>

    <div id="musicPlayer" class="music-player hidden">
        <div class="player-info">
            <div class="album-art">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="5.5" cy="17.5" r="2.5"></circle>
                    <circle cx="17.5" cy="15.5" r="2.5"></circle>
                    <path d="M8 17V5l12-2v12"></path>
                    <path d="M8 9l12-2"></path>
                </svg>
            </div>
            <div class="track-details">
                <div class="track-title" id="playerTitle">No song playing</div>
                <div class="track-artist" id="playerArtist">Select a song</div>
            </div>
        </div>
        
        <div class="player-controls-container">
            <div class="player-controls">
                <button id="btnShuffle" class="control-btn" aria-label="Shuffle">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5"></path><path d="M4 20L21 3"></path><path d="M21 16v5h-5"></path><path d="M15 15l6 6"></path><path d="M4 4l5 5"></path></svg>
                </button>
                <button id="btnPrev" class="control-btn" aria-label="Previous">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>
                </button>
                <button id="btnPlayPause" class="control-btn play-btn" aria-label="Play/Pause">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="playIcon"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                </button>
                <button id="btnNext" class="control-btn" aria-label="Next">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
                </button>
                <button id="btnRepeat" class="control-btn" aria-label="Repeat">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
                </button>
            </div>
            
            <div class="progress-container">
                <span id="timeCurrent" class="time-display">0:00</span>
                <input type="range" id="progressBar" class="progress-bar" min="0" max="100" value="0">
                <span id="timeTotal" class="time-display">0:00</span>
            </div>
        </div>
        
        <div class="player-volume">
            <svg id="volumeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
            <input type="range" id="volumeBar" class="volume-bar" min="0" max="100" value="100">
            <button id="btnClosePlayer" class="control-btn" aria-label="Close Player" style="margin-left: 8px;" title="Close Player">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
    </div>

    <footer class="footer">
        <p>Created by Mohammad Faiz</p>
        <a href="https://github.com/Mohammad-Faiz-Cloud-Engineer" target="_blank" rel="noopener noreferrer" class="github-link" aria-label="Visit GitHub Profile">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            <span>GitHub</span>
        </a>
    </footer>

    <div id="pdfModal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <div class="pdf-title" id="pdfTitle"></div>
                <div class="modal-actions">
                    <button class="modal-download" id="downloadPdf" aria-label="Download PDF" title="Download PDF">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                        </svg>
                    </button>
                    <button class="modal-close" id="closeModal" aria-label="Close PDF viewer">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
            <iframe id="pdfViewer" title="PDF Viewer"></iframe>
        </div>
    </div>

    <div id="textModal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <div class="pdf-title" id="textTitle"></div>
                <div class="modal-actions">
                    <button class="modal-copy" id="copyText" aria-label="Copy to clipboard" title="Copy to clipboard">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                    <button class="modal-close" id="closeTextModal" aria-label="Close text viewer">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="textViewer" class="text-viewer"></div>
        </div>
    </div>

    <script src="./config.js"></script>
    <script src="./data.js"></script>
    <script src="./music-data.js"></script>
    <script src="./app.js"></script>
    <script src="./music-app.js"></script>
    
    <script>
        /**
         * Service Worker Registration with no-cache policy
         */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js', { 
                    scope: './',
                    updateViaCache: 'none'
                })
                    .then(registration => {
                        // Check for updates immediately
                        registration.update();

                        // Check for updates every 60 seconds
                        setInterval(() => {
                            registration.update();
                        }, 60000);

                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            if (newWorker) {
                                newWorker.addEventListener('statechange', () => {
                                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                        // New version available - notify user
                                        if (confirm('New version available! Reload to update?')) {
                                            newWorker.postMessage({ type: 'SKIP_WAITING' });
                                            window.location.reload();
                                        }
                                    }
                                });
                            }
                        });
                    })
                    .catch(error => {
                        console.error('ServiceWorker registration failed:', error);
                    });

                // Handle controller change
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    window.location.reload();
                });
            });
        }
    </script>
</body>
</html>
