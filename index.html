<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vibrant Academy - Study Materials for Class 11th and 12th Physics, Chemistry, and Mathematics">
    <meta name="author" content="Vibrant Academy">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="theme-color" content="#ff3366">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vibrant Academy">
    <title>Vibrant Academy | Study Materials</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon/logo.png">
    <link rel="apple-touch-icon" href="icon/logo.png">
    
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="nav">
        <div class="nav-wrap">
            <div class="brand">Vibrant Academy</div>
            <div class="class-tabs">
                <button class="tab active" data-class="11">11</button>
                <button class="tab" data-class="12">12</button>
            </div>
        </div>
    </nav>

    <div class="hero">
        <div class="hero-wrap">
            <input type="text" id="searchInput" placeholder="Search materials..." class="search">
            <button id="downloadBtn" class="download-btn" aria-label="Download complete class modules">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                </svg>
                <span id="downloadText">Download All Materials</span>
            </button>
        </div>
    </div>

    <main class="main">
        <div id="content"></div>
    </main>

    <div id="pdfModal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <div class="pdf-title" id="pdfTitle"></div>
                <button class="modal-close" id="closeModal" aria-label="Close PDF viewer">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <iframe id="pdfViewer" title="PDF Viewer" frameborder="0"></iframe>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').catch(() => {
                    // Service worker registration failed - app will work without offline support
                });
            });
        }
    </script>
</body>
</html>
