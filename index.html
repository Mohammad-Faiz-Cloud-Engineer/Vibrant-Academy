<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vibrant Academy - Study Materials for Class 11th and 12th Physics, Chemistry, and Mathematics">
    <meta name="author" content="Vibrant Academy">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="theme-color" content="#ff4757">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vibrant Academy">
    <title>Vibrant Academy | Study Materials</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" href="./icon/logo.png">
    <link rel="apple-touch-icon" href="./icon/logo.png">
    
    <link rel="stylesheet" href="./styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="nav">
        <div class="nav-wrap">
            <div class="brand">
                <img src="./icon/logo.png" alt="Vibrant Academy Logo" class="brand-logo">
                <span class="brand-name">Vibrant Academy</span>
            </div>
            <div class="class-tabs">
                <button class="tab active" data-class="11">11</button>
                <button class="tab" data-class="12">12</button>
                <button class="tab" data-class="others">Others</button>
            </div>
        </div>
    </nav>

    <div class="hero">
        <div class="hero-wrap">
            <input type="text" id="searchInput" placeholder="Search materials..." class="search">
            <button id="downloadBtn" class="download-btn" aria-label="Download complete class modules">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                </svg>
                <span id="downloadText">Download All Materials</span>
            </button>
        </div>
    </div>

    <main class="main">
        <div id="content"></div>
    </main>

    <div id="pdfModal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <div class="pdf-title" id="pdfTitle"></div>
                <div class="modal-actions">
                    <button class="modal-download" id="downloadPdf" aria-label="Download PDF" title="Download PDF">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                        </svg>
                    </button>
                    <button class="modal-close" id="closeModal" aria-label="Close PDF viewer">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
            <iframe id="pdfViewer" title="PDF Viewer"></iframe>
        </div>
    </div>

    <script src="./config.js"></script>
    <script src="./data.js"></script>
    <script src="./app.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(registration => {
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // New version available
                                }
                            });
                        });
                    })
                    .catch(() => {
                        // Service Worker not supported or registration failed
                    });
            });
        }
    </script>
</body>
</html>
