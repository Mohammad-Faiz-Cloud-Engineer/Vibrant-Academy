<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Loading Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }
        .test-item {
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .test-item.success {
            background-color: #d4edda;
            border-color: #c3e6cb;
        }
        .test-item.error {
            background-color: #f8d7da;
            border-color: #f5c6cb;
        }
        .test-item.pending {
            background-color: #fff3cd;
            border-color: #ffeaa7;
        }
        .status {
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 3px;
        }
        .status.success { color: #155724; }
        .status.error { color: #721c24; }
        .status.pending { color: #856404; }
        button {
            padding: 10px 20px;
            margin: 10px 5px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background: #0056b3;
        }
        #summary {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            margin: 20px 0;
        }
        .file-name {
            flex: 1;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>PDF Loading Test - Vibrant Academy</h1>
    
    <div id="summary">
        <h2>Test Summary</h2>
        <p>Total PDFs: <span id="total">0</span></p>
        <p>✓ Successful: <span id="success">0</span></p>
        <p>✗ Failed: <span id="failed">0</span></p>
        <p>⏳ Pending: <span id="pending">0</span></p>
    </div>
    
    <button onclick="testAll()">Test All PDFs</button>
    <button onclick="testFailed()">Retest Failed</button>
    <button onclick="clearResults()">Clear Results</button>
    
    <div id="results"></div>
    
    <script src="config.js"></script>
    <script src="data.js"></script>
    <script>
        const results = {};
        let totalTests = 0;
        
        function updateSummary() {
            const statuses = Object.values(results);
            document.getElementById('total').textContent = totalTests;
            document.getElementById('success').textContent = statuses.filter(s => s === 'success').length;
            document.getElementById('failed').textContent = statuses.filter(s => s === 'error').length;
            document.getElementById('pending').textContent = statuses.filter(s => s === 'pending').length;
        }
        
        function testPdf(path, name, id) {
            return new Promise((resolve) => {
                const encodedPath = path.split('/').map(part => encodeURIComponent(part)).join('/');
                
                fetch(encodedPath, { method: 'HEAD' })
                    .then(response => {
                        if (response.ok) {
                            results[id] = 'success';
                            updateTestItem(id, 'success', '✓ OK');
                            resolve({ id, status: 'success', path });
                        } else {
                            results[id] = 'error';
                            updateTestItem(id, 'error', `✗ ${response.status}`);
                            resolve({ id, status: 'error', path, error: response.status });
                        }
                    })
                    .catch(error => {
                        results[id] = 'error';
                        updateTestItem(id, 'error', '✗ Failed');
                        resolve({ id, status: 'error', path, error: error.message });
                    });
            });
        }
        
        function updateTestItem(id, status, message) {
            const item = document.getElementById(id);
            if (item) {
                item.className = `test-item ${status}`;
                item.querySelector('.status').textContent = message;
                item.querySelector('.status').className = `status ${status}`;
            }
            updateSummary();
        }
        
        function createTestItem(id, name, path) {
            return `
                <div id="${id}" class="test-item pending">
                    <div class="file-name">
                        <strong>${name}</strong><br>
                        <small>${path}</small>
                    </div>
                    <span class="status pending">⏳ Pending</span>
                </div>
            `;
        }
        
        async function testAll() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            totalTests = 0;
            
            const tests = [];
            
            Object.entries(STUDY_MATERIALS).forEach(([className, subjects]) => {
                Object.entries(subjects).forEach(([subject, data]) => {
                    Object.entries(data.categories).forEach(([category, pdfs]) => {
                        pdfs.forEach((pdf, index) => {
                            const id = `test-${className}-${subject}-${category}-${index}`.replace(/[^a-zA-Z0-9-]/g, '-');
                            totalTests++;
                            results[id] = 'pending';
                            resultsDiv.innerHTML += createTestItem(id, pdf.name, pdf.file);
                            tests.push({ id, path: pdf.file, name: pdf.name });
                        });
                    });
                });
            });
            
            updateSummary();
            
            // Test in batches of 5 to avoid overwhelming the browser
            for (let i = 0; i < tests.length; i += 5) {
                const batch = tests.slice(i, i + 5);
                await Promise.all(batch.map(test => testPdf(test.path, test.name, test.id)));
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            
            console.log('All tests complete!', results);
        }
        
        async function testFailed() {
            const failedTests = Object.entries(results)
                .filter(([id, status]) => status === 'error')
                .map(([id]) => id);
            
            if (failedTests.length === 0) {
                alert('No failed tests to retry!');
                return;
            }
            
            for (const id of failedTests) {
                const item = document.getElementById(id);
                const path = item.querySelector('small').textContent;
                const name = item.querySelector('strong').textContent;
                await testPdf(path, name, id);
            }
        }
        
        function clearResults() {
            document.getElementById('results').innerHTML = '';
            Object.keys(results).forEach(key => delete results[key]);
            totalTests = 0;
            updateSummary();
        }
    </script>
</body>
</html>
